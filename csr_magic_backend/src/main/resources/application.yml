spring:
  application:
    name: csr-magic-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/CSR_DB?currentSchema=csr_v2&stringtype=unspecified}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# AI 服务配置
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}

# 应用自定义配置
app:
  # CORS 允许的来源（逗号分隔多个 URL）
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # Refresh Token Cookie 的 Secure 标志（HTTPS 环境设为 true）
  cookie-secure: ${COOKIE_SECURE:false}
  # Swagger UI 是否启用（生产环境建议关闭）
  swagger-enabled: ${SWAGGER_ENABLED:true}
  # AI 服务回调令牌（与 AI 服务共享，用于服务间认证）
  poster-callback-token: ${POSTER_CALLBACK_TOKEN:}

# 日志配置
logging:
  level:
    com.csr: ${LOG_LEVEL_CSR:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
